<body>
<div id="root"></div>
<script type="module">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const e = React.createElement;

/* ─────────────────────────────────────────────────────────────
   AI LAYER — Pollinations.ai
   100% free · no API key · no signup · powered by GPT-4o
   ───────────────────────────────────────────────────────────── */
async function ai(systemPrompt, userPrompt) {
  const attempts = [
    { url: "https://text.pollinations.ai/openai", model: "openai-large" },
    { url: "https://text.pollinations.ai/openai", model: "openai" },
    { url: "https://text.pollinations.ai/openai", model: "mistral" },
  ];
  let lastErr = "";
  for (const { url, model } of attempts) {
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user",   content: userPrompt   },
          ],
          seed: Math.floor(Math.random() * 9999),
        }),
      });
      if (!res.ok) { lastErr = `HTTP ${res.status} (${model})`; continue; }
      const data = await res.json();
      const text = data?.choices?.[0]?.message?.content || "";
      if (!text) { lastErr = `Empty response (${model})`; continue; }
      return text.trim();
    } catch(err) {
      lastErr = err.message;
    }
  }
  throw new Error(`AI unavailable. Last error: ${lastErr}`);
}

/* ─────────────────────────────────────────────────────────────
   CONSTANTS
   ───────────────────────────────────────────────────────────── */
const SAMPLE_TOPICS = [
  "Quantum Physics", "Chess Strategy", "Machine Learning",
  "Ancient Rome", "Jazz Theory", "Stoic Philosophy", "Neuroscience",
];
const XP_PER_ITEM = 50;
const RANKS = [
  { name:"Seedling",    min:0,    color:"#6b7280", icon:"🌱" },
  { name:"Sprout",      min:200,  color:"#3b82f6", icon:"🌿" },
  { name:"Scholar",     min:600,  color:"#8b5cf6", icon:"📖" },
  { name:"Expert",      min:1200, color:"#f59e0b", icon:"⭐" },
  { name:"Master",      min:2000, color:"#ef4444", icon:"🔥" },
  { name:"Grandmaster", min:3000, color:"#63cd96", icon:"👑" },
];
const getRank = xp => [...RANKS].reverse().find(r => xp >= r.min) || RANKS[0];

/* ─────────────────────────────────────────────────────────────

   ───────────────────────────────────────────────────────────── */

}

/* ─────────────────────────────────────────────────────────────
   KNOWLEDGE ITEM
   ───────────────────────────────────────────────────────────── */
function KnowledgeItem({ item, checked, onToggle, isNext, onDeepDive }) {
  const [burst, setBurst] = useState(false);
  const click = ev => {
    if (!checked) { setBurst(true); setTimeout(() => setBurst(false), 500); }

    onClick: click,
    style:{
      display:"flex", alignItems:"flex-start", gap:"0.6rem",
      padding:"0.55rem 0.8rem", borderRadius:"8px",
      background: checked ? "rgba(99,205,150,0.07)" : isNext ? "rgba(99,205,150,0.03)" : "transparent",
      border: checked ? "1px solid rgba(99,205,150,0.18)" : isNext ? "1px solid rgba(99,205,150,0.1)" : "1px solid transparent",
      transition:"all 0.2s",
      transform: burst ? "scale(1.02)" : "scale(1)",
    }
  },
    /* Checkbox */
    e("div", {
      style:{
        width:"16px", height:"16px", minWidth:"16px", borderRadius:"4px",
        border: checked ? "none" : "1.5px solid rgba(255,255,255,0.15)",
        background: checked ? "linear-gradient(135deg,#63cd96,#34d399)" : "transparent",
        display:"flex", alignItems:"center", justifyContent:"center",
        marginTop:"2px", transition:"all 0.25s", flexShrink:0,

/* ─────────────────────────────────────────────────────────────

   ───────────────────────────────────────────────────────────── */
function CategoryBlock({ category, items, checked, onToggle, nextIds, onDeepDive }) {

  const done = items.filter(i => checked[i.id]).length;
  const pct  = Math.round((done / items.length) * 100);

      background:"rgba(255,255,255,0.02)",
      border:`1px solid ${gold ? "rgba(99,205,150,0.22)" : "rgba(255,255,255,0.05)"}`,

    }
  },
    e("button", {
      className:"cat-btn",
      onClick:() => setOpen(o => !o),
      style:{

        gold ? e("span", {style:{fontSize:"0.8rem"}}, "✨") : null

      e("div", { style:{ display:"flex", alignItems:"center", gap:"0.75rem" } },
        e("div", { style:{ width:"70px", height:"3px", background:"rgba(255,255,255,0.07)", borderRadius:"2px", overflow:"hidden" } },
          e("div", {
            style:{
              height:"100%", width:`${pct}%`, borderRadius:"2px", transition:"width 0.5s ease",
              background: gold ? "linear-gradient(90deg,#63cd96,#34d399)" : "linear-gradient(90deg,#3b82f6,#8b5cf6)",

      style:{
        padding:"0 0.9rem 0.9rem",
        display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:"0.3rem",
      }
    }, items.map(item =>
      e(KnowledgeItem, { key:item.id, item, checked:!!checked[item.id], onToggle, isNext:nextIds?.has(item.id), onDeepDive })
    )) : null
  );
}

/* ─────────────────────────────────────────────────────────────

          e("div", {style:{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:"1.25rem",color:"#dde1ea",letterSpacing:"-0.01em"}}, item.term)
        ),
        e("button", {

              e("div", {style:{height:"100%",width:"100%",background:"linear-gradient(90deg,transparent,rgba(99,205,150,0.2),transparent)",backgroundSize:"200% 100%",animation:"shimmer 1.5s ease-in-out infinite 0.6s"}})
            )

/* ─────────────────────────────────────────────────────────────
   ACHIEVEMENT TOAST
   ───────────────────────────────────────────────────────────── */

    style:{

    e("div", {style:{display:"flex",alignItems:"center",gap:"0.75rem"}},

        e("div", {style:{fontSize:"0.58rem",letterSpacing:"0.15em",color:"rgba(99,205,150,0.7)",textTransform:"uppercase",marginBottom:"2px",fontFamily:"'DM Mono',monospace"}}, "Achievement Unlocked"),
        e("div", {style:{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:"0.95rem",color:"#dde1ea"}}, toast.label),

/* ─────────────────────────────────────────────────────────────
   APP
   ───────────────────────────────────────────────────────────── */
function App() {
  const [inputVal,     setInputVal]     = useState("");
  const [tree,         setTree]         = useState(null);
  const [loading,      setLoading]      = useState(false);
  const [checked,      setChecked]      = useState({});
  const [popups,       setPopups]       = useState([]);
  const [totalXP,      setTotalXP]      = useState(0);
  const [achievements, setAchievements] = useState([]);
  const [toast,        setToast]        = useState(null);
  const [error,        setError]        = useState(null);
  const [deepDiveItem, setDeepDiveItem] = useState(null);
  const [activeTab,    setActiveTab]    = useState("path");
  const pid = useRef(0);

  /* Flatten all items with their category label */
  const allItems = useMemo(() => {
    if (!tree) return [];
    return tree.categories.flatMap(cat =>
      cat.items.map(item => ({ ...item, category: cat.name }))
    );
  }, [tree]);

  const totalItems   = allItems.length;
  const checkedCount = Object.values(checked).filter(Boolean).length;
  const overallPct   = totalItems ? Math.round((checkedCount / totalItems) * 100) : 0;
  const rank         = getRank(totalXP);

  /* Smart ordering: prefer in-progress categories, then by order field */
  const nextItems = useMemo(() => {
    if (!tree) return [];
    const unchecked = allItems.filter(i => !checked[i.id]);
    const catProgress = {};
    tree.categories.forEach(cat => {
      const done = cat.items.filter(i => checked[i.id]).length;
      catProgress[cat.name] = done / cat.items.length;
    });
    return [...unchecked].sort((a, b) => {
      const scoreA = catProgress[a.category] * 100 - (a.order || 50);
      const scoreB = catProgress[b.category] * 100 - (b.order || 50);
      return scoreB - scoreA;
    });
  }, [tree, checked, allItems]);

  const nextIds = useMemo(() => new Set(nextItems.slice(0,5).map(i => i.id)), [nextItems]);

  /* ── Generate Tree ── */
  const generateTree = async topic => {
    if (!topic.trim()) return;
    setLoading(true); setError(null); setTree(null); setChecked({}); setTotalXP(0); setAchievements([]);
    try {
      const raw = await ai(
        `You are a knowledge architect. You ONLY output valid JSON — no markdown fences, no explanation, no preamble. Just raw JSON.`,
        `Build a knowledge tree for the topic: "${topic}"

Return this exact JSON structure:
{
  "title": "Topic Name",
  "emoji": "🚀",
  "description": "One vivid sentence on why mastering this changes how you see the world",
  "categories": [
    {
      "name": "Category Name",
      "items": [
        { "id": "c1_i1", "term": "Concept Name", "hint": "Definition in under 10 words", "order": 1 }
      ]
    }
  ]
}

Requirements:
- 5 to 7 categories, arranged from foundational to advanced
- 6 to 10 items per category
- "order" is a global integer (1 = most fundamental across entire topic, higher = more advanced)
- Items within each category should progress from basic to nuanced
- IDs must be unique strings like c1_i1, c2_i3
- Return ONLY the JSON object. Nothing else.`
      );

      // Strip any accidental markdown fences
      const clean = raw.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "").trim();
      const parsed = JSON.parse(clean);
      setTree(parsed);
      setActiveTab("path");
    } catch(err) {
      if (err.message.includes("JSON")) {
        setError("Got a bad response from AI — please try again.");
      } else {
        setError(err.message);
      }
    }
    setLoading(false);
  };

  /* ── Toggle item ── */
  const handleToggle = useCallback((id, ev) => {
    const rect = ev?.currentTarget?.getBoundingClientRect?.();
    setChecked(prev => {
      const nowChecked = !prev[id];
      if (nowChecked) {
        setTotalXP(x => x + XP_PER_ITEM);
        if (rect) {
          const uid = ++pid.current;
          setPopups(p => [...p, { id:uid, xp:XP_PER_ITEM, x:rect.left+rect.width/2-25, y:rect.top-15 }]);
          setTimeout(() => setPopups(p => p.filter(x => x.id !== uid)), 1400);
        }
      } else {
        setTotalXP(x => Math.max(0, x - XP_PER_ITEM));
      }
      return { ...prev, [id]: nowChecked };
    });
  }, []);

  /* ── Achievements ── */
  useEffect(() => {
    if (!tree) return;
    const pct = totalItems ? Math.round((checkedCount / totalItems) * 100) : 0;
    [
      { id:"first",   condition: checkedCount >= 1,  label:"First Spark",   desc:"First concept mastered!",    icon:"✨" },
      { id:"ten",     condition: checkedCount >= 10, label:"Momentum",      desc:"10 concepts unlocked!",       icon:"⚡" },
      { id:"quarter", condition: pct >= 25,          label:"Rooted",        desc:"25% of the tree mastered!",  icon:"🌿" },
      { id:"half",    condition: pct >= 50,          label:"Branching Out", desc:"Halfway through the tree!",  icon:"🌳" },
      { id:"ninety",  condition: pct >= 90,          label:"Almost There",  desc:"90% mastery reached!",       icon:"🔥" },
      { id:"done",    condition: pct === 100,        label:"Grand Master",  desc:"Full topic mastered!",       icon:"👑" },
    ].forEach(a => {
      if (a.condition && !achievements.includes(a.id)) {
        setAchievements(p => [...p, a.id]);
        setToast(a);
        setTimeout(() => setToast(null), 3500);
      }
    });
  }, [checkedCount, totalItems]);

  /* ─────────────────────────────────────────────────────────
     RENDER
     ───────────────────────────────────────────────────────── */
  return e("div", {
    style:{
      minHeight:"100vh",
      background:`
        radial-gradient(ellipse at 15% 15%, rgba(59,130,246,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(99,205,150,0.04) 0%, transparent 55%),
        #0a0d13
      `,
    }
  },
    popups.map(p => e(XPPopup, { key:p.id, xp:p.xp, pos:p })),
    deepDiveItem ? e(DeepDiveModal, { item:deepDiveItem, topic:tree?.title || inputVal, onClose:()=>setDeepDiveItem(null) }) : null,
    e(Toast, { toast }),

    e("div", { style:{ maxWidth:"880px", margin:"0 auto", padding:"2.5rem 1.25rem" } },

      /* ── Header ── */
      e("div", { style:{ marginBottom:"2.5rem", textAlign:"center" } },
        e("div", { style:{ fontSize:"2.8rem", marginBottom:"0.75rem", filter:"drop-shadow(0 0 20px rgba(99,205,150,0.35))" } }, "🌳"),
        e("div", {
          style:{
            fontFamily:"'Fraunces',serif", fontWeight:900,
            fontSize:"clamp(2rem,5vw,3rem)", letterSpacing:"-0.03em",
            background:"linear-gradient(135deg,#dde1ea 0%,#63cd96 50%,#dde1ea 100%)",
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
            lineHeight:1.1, marginBottom:"0.4rem",
          }
        }, "Knowledge Tree"),
        e("div", { style:{ color:"rgba(255,255,255,0.25)", fontSize:"0.7rem", letterSpacing:"0.2em", textTransform:"uppercase" } },
          "Map what you know. Discover what's next."),
        e("div", { style:{ marginTop:"0.6rem", display:"inline-flex", alignItems:"center", gap:"0.4rem", background:"rgba(99,205,150,0.06)", border:"1px solid rgba(99,205,150,0.15)", borderRadius:"20px", padding:"3px 10px" } },
          e("span", { style:{ width:"6px", height:"6px", borderRadius:"50%", background:"#63cd96", boxShadow:"0 0 6px #63cd96", display:"inline-block", animation:"pulse 2s ease-in-out infinite" } }),
          e("span", { style:{ fontFamily:"'DM Mono',monospace", fontSize:"0.6rem", color:"rgba(99,205,150,0.7)", letterSpacing:"0.06em" } }, "Free · No signup · No API key required")
        )
      ),

      /* ── XP Bar ── */
      totalXP > 0 ? e("div", {
        style:{
          background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)",
          borderRadius:"12px", padding:"0.8rem 1.1rem", marginBottom:"1.25rem",
          display:"flex", alignItems:"center", gap:"0.9rem",
        }
      },
        e("div", {style:{fontFamily:"'DM Mono',monospace",fontWeight:500,color:rank.color,fontSize:"0.8rem",minWidth:"100px",textShadow:`0 0 12px ${rank.color}`}}, `${rank.icon} ${rank.name}`),
        e("div", {style:{flex:1}},
          e("div", {style:{height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}},
            e("div", {style:{height:"100%",width:`${Math.min(100,(totalXP%1000)/10)}%`,background:`linear-gradient(90deg,${rank.color},white)`,borderRadius:"2px",transition:"width 0.5s ease",boxShadow:`0 0 6px ${rank.color}`}})
          )
        ),
        e("div", {style:{fontSize:"0.72rem",color:"#63cd96",fontFamily:"'DM Mono',monospace"}}, `${totalXP.toLocaleString()} XP`)
      ) : null,

      /* ── Search ── */
      e("div", { style:{ display:"flex", gap:"0.6rem", marginBottom:"0.8rem", flexWrap:"wrap" } },
        e("input", {
          value: inputVal,
          onChange: ev => setInputVal(ev.target.value),
          onKeyDown: ev => ev.key === "Enter" && generateTree(inputVal),
          placeholder: "Enter any topic… (Quantum Physics, Jazz Theory, Ancient Rome…)",
          style:{
            flex:1, minWidth:"200px", background:"rgba(255,255,255,0.03)",
            border:"1px solid rgba(255,255,255,0.08)", borderRadius:"10px",
            padding:"0.85rem 1.1rem", color:"#dde1ea",
            fontFamily:"'DM Mono',monospace", fontSize:"0.8rem", transition:"border-color 0.2s",
          },
          onFocus: ev => { ev.target.style.borderColor = "rgba(99,205,150,0.35)"; },
          onBlur:  ev => { ev.target.style.borderColor = "rgba(255,255,255,0.08)"; },
        }),
        e("button", {
          className:"build-btn",
          onClick: () => generateTree(inputVal),
          disabled: loading || !inputVal.trim(),
          style:{
            background: loading || !inputVal.trim() ? "rgba(255,255,255,0.05)" : "linear-gradient(135deg,#2d9e67,#63cd96)",
            border:"none", borderRadius:"10px", padding:"0.85rem 1.4rem",
            color: loading || !inputVal.trim() ? "rgba(255,255,255,0.25)" : "#0a0d13",
            fontFamily:"'DM Mono',monospace", fontWeight:500, fontSize:"0.78rem",
            cursor: loading || !inputVal.trim() ? "not-allowed" : "pointer",
            letterSpacing:"0.04em", transition:"all 0.2s", whiteSpace:"nowrap",
          }
        }, loading ? "Growing…" : "Build Tree →")
      ),

      /* Quick Topics */
      e("div", { style:{ display:"flex", gap:"0.4rem", flexWrap:"wrap", marginBottom:"2rem" } },
        SAMPLE_TOPICS.map(t =>
          e("button", {
            key:t, className:"quick-btn",
            onClick: () => { setInputVal(t); generateTree(t); },
            style:{
              background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.06)",
              borderRadius:"6px", padding:"0.3rem 0.65rem", color:"rgba(255,255,255,0.38)",
              fontFamily:"'DM Mono',monospace", fontSize:"0.62rem",
              cursor:"pointer", transition:"all 0.2s", letterSpacing:"0.03em",
            }
          }, t)
        )
      ),

      /* Loading */
      loading ? e("div", { style:{ textAlign:"center", padding:"4rem 0" } },
        e("div", { style:{ fontSize:"2.5rem", marginBottom:"1rem", animation:"spin 3s linear infinite", display:"inline-block" } }, "🌿"),
        e("div", { style:{ fontFamily:"'DM Mono',monospace", fontSize:"0.7rem", letterSpacing:"0.15em", textTransform:"uppercase", color:"rgba(255,255,255,0.28)", animation:"pulse 1.5s ease-in-out infinite" } },
          "Mapping the knowledge domain…")
      ) : null,

      /* Error */
      error ? e("div", {
        style:{
          padding:"1rem 1.2rem", borderRadius:"10px", background:"rgba(239,68,68,0.07)",
          border:"1px solid rgba(239,68,68,0.18)", color:"#fca5a5",
          fontSize:"0.76rem", marginBottom:"1rem", fontFamily:"'DM Mono',monospace", lineHeight:1.6,
        }
      },
        e("div", {style:{marginBottom:"0.4rem", fontWeight:700}}, "⚠ Couldn't build tree"),
        error
      ) : null,

      /* ── Tree UI ── */
      tree && !loading ? e("div", { style:{ animation:"fadeIn 0.4s ease-out" } },

        /* Tree header */
        e("div", {
          style:{
            marginBottom:"1.25rem", padding:"1.3rem 1.5rem",
            background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)",
            borderRadius:"14px", display:"flex", alignItems:"center",
            justifyContent:"space-between", flexWrap:"wrap", gap:"1rem",
          }
        },
          e("div", null,
            e("div", { style:{ display:"flex", alignItems:"center", gap:"0.65rem", marginBottom:"0.3rem" } },
              e("span", { style:{ fontSize:"1.6rem" } }, tree.emoji),
              e("div", { style:{ fontFamily:"'Fraunces',serif", fontWeight:900, fontSize:"1.4rem", color:"#dde1ea", letterSpacing:"-0.02em" } }, tree.title)
            ),
            e("div", { style:{ color:"rgba(255,255,255,0.32)", fontSize:"0.73rem", maxWidth:"480px", lineHeight:1.5 } }, tree.description)
          ),
          e("div", { style:{ textAlign:"right" } },
            e("div", {
              style:{
                fontSize:"2.2rem", fontWeight:900, fontFamily:"'Fraunces',serif", letterSpacing:"-0.03em",
                color: overallPct===100 ? "#63cd96" : "#dde1ea",
                textShadow: overallPct===100 ? "0 0 24px rgba(99,205,150,0.7)" : "none",
              }
            }, `${overallPct}%`),
            e("div", { style:{ fontSize:"0.6rem", color:"rgba(255,255,255,0.25)", letterSpacing:"0.1em" } }, `${checkedCount}/${totalItems} MASTERED`)
          )
        ),

        /* Tabs */
        e("div", {
          style:{
            display:"flex", gap:"0.25rem", marginBottom:"1.1rem",
            background:"rgba(255,255,255,0.02)", borderRadius:"10px", padding:"3px",
            border:"1px solid rgba(255,255,255,0.05)",
          }
        },
          [
            { key:"path", label:"🎯  Learning Path" },
            { key:"tree", label:"🌳  Full Tree" },
          ].map(tab =>
            e("button", {
              key:tab.key, className:"tab-btn",
              onClick: () => setActiveTab(tab.key),
              style:{
                flex:1, padding:"0.5rem",
                background: activeTab===tab.key ? "rgba(99,205,150,0.08)" : "transparent",
                border: activeTab===tab.key ? "1px solid rgba(99,205,150,0.18)" : "1px solid transparent",
                borderRadius:"8px", color: activeTab===tab.key ? "#63cd96" : "rgba(255,255,255,0.3)",
                fontFamily:"'DM Mono',monospace", fontSize:"0.67rem",
                cursor:"pointer", transition:"all 0.2s", letterSpacing:"0.05em",
              }
            }, tab.label)
          )
        ),

        /* Path Tab */
        activeTab === "path" ? e("div", { style:{ animation:"fadeIn 0.3s ease-out" } },
          overallPct < 100 ? e(NextToLearnPanel, { nextItems, checked, onToggle:handleToggle }) : null,
          e("div", {
            style:{
              display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))", gap:"0.5rem",
            }
          },
            tree.categories.map((cat, i) => {
              const done = cat.items.filter(item => checked[item.id]).length;
              const pct  = Math.round((done / cat.items.length) * 100);
              const gold = pct === 100;
              return e("div", {
                key:i, className:"cat-card",
                onClick: () => setActiveTab("tree"),
                style:{
                  padding:"0.85rem 1rem", borderRadius:"10px", cursor:"pointer",
                  background: gold ? "rgba(99,205,150,0.06)" : "rgba(255,255,255,0.02)",
                  border:`1px solid ${gold ? "rgba(99,205,150,0.2)" : "rgba(255,255,255,0.05)"}`,
                  transition:"all 0.2s",
                }
              },
                e("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"0.45rem" } },
                  e("div", { style:{ fontFamily:"'Fraunces',serif", fontWeight:700, fontSize:"0.85rem", color: gold?"#63cd96":"#dde1ea" } }, cat.name),
                  e("div", { style:{ fontFamily:"'DM Mono',monospace", fontSize:"0.62rem", color:"rgba(255,255,255,0.28)" } }, `${done}/${cat.items.length}`)
                ),
                e("div", { style:{ height:"3px", background:"rgba(255,255,255,0.06)", borderRadius:"2px", overflow:"hidden" } },
                  e("div", {
                    style:{
                      height:"100%", width:`${pct}%`, borderRadius:"2px", transition:"width 0.5s ease",
                      background: gold ? "linear-gradient(90deg,#63cd96,#34d399)" : "linear-gradient(90deg,#3b82f6,#8b5cf6)",
                      boxShadow: gold ? "0 0 6px rgba(99,205,150,0.5)" : "none",
                    }
                  })
                )
              );
            })
          )
        ) : null,

        /* Tree Tab */
        activeTab === "tree" ? e("div", { style:{ animation:"fadeIn 0.3s ease-out" } },
          tree.categories.map((cat, i) =>
            e(CategoryBlock, {
              key:i, category:cat.name, items:cat.items, checked,
              onToggle:handleToggle, nextIds, onDeepDive:setDeepDiveItem,
            })
          )
        ) : null,

        /* Mastery Banner */
        overallPct === 100 ? e("div", {
          style:{
            textAlign:"center", padding:"3rem 1rem",
            background:"rgba(99,205,150,0.04)", border:"1px solid rgba(99,205,150,0.18)",
            borderRadius:"14px", marginTop:"1.5rem", animation:"glow 3s ease-in-out infinite",
          }
        },
          e("div", {style:{fontSize:"3rem",marginBottom:"0.75rem"}}, "👑"),
          e("div", {style:{fontFamily:"'Fraunces',serif",fontWeight:900,fontSize:"1.8rem",color:"#63cd96",textShadow:"0 0 24px rgba(99,205,150,0.6)",letterSpacing:"-0.02em"}}, "Full Mastery"),
          e("div", {style:{color:"rgba(255,255,255,0.32)",fontSize:"0.76rem",marginTop:"0.5rem"}}, `You've fully mastered the ${tree.title} knowledge tree.`),
          e("button", {
            onClick: () => { setTree(null); setInputVal(""); setChecked({}); setTotalXP(0); },
            style:{
              marginTop:"1.5rem", background:"rgba(99,205,150,0.08)",
              border:"1px solid rgba(99,205,150,0.25)", borderRadius:"8px",
              padding:"0.65rem 1.5rem", color:"#63cd96",
              fontFamily:"'DM Mono',monospace", fontSize:"0.72rem",
              cursor:"pointer", transition:"all 0.2s",
            }
          }, "Explore a New Topic →")
        ) : null

      ) : null,

      /* Empty State */
      !tree && !loading && !error ? e("div", { style:{ textAlign:"center", padding:"5rem 1rem", color:"rgba(255,255,255,0.1)" } },
        e("div", { style:{ fontSize:"4rem", marginBottom:"1rem", opacity:0.25 } },
          e("span", { style:{ display:"inline-block", animation:"treeSway 4s ease-in-out infinite", transformOrigin:"bottom" } }, "🌱")
        ),
        e("div", { style:{ fontSize:"0.7rem", letterSpacing:"0.18em", textTransform:"uppercase" } }, "Enter a topic above to grow your knowledge tree")
      ) : null

    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
